---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "redis.fullname" . }}-headless
  namespace: {{ include "redis.namespace" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
    redis/metrics-service: {{ include "redis.fullname" . }}-metrics
    {{- with .Values.metrics.service.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.metrics.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ports:
    - port: {{ .Values.service.serverPort }}
      targetPort: redis
      protocol: TCP
      name: redis
    {{- if .Values.haMode.enabled }}
    - port: {{ .Values.service.sentinelPort }}
      targetPort: sentinel
      protocol: TCP
      name: sentinel
    {{- end }}
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    {{- include "redis.selectorLabels" . | nindent 4 }}







