apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "redis.fullname" . }}
  namespace: {{ include "redis.namespace" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
data:
  redis.conf: |
    {{- include "redis.config" . | nindent 4 }}
  sentinel.conf: |
    {{- include "redis.sentinelConfig" . | nindent 4 }}